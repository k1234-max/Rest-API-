<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Finder</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        header{
            background:#d62828;
            color:white;
            padding:25px;
            text-align:center;
            box-shadow:0 3px 10px rgba(0,0,0,0.2);
        }

        header h1{
            font-size:40px;
            margin-bottom:10px;
        }

        header p{
            font-size:18px;
        }

        nav{
            background:#222;
            padding:15px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 20px;
            font-size:18px;
            font-weight:bold;
        }

        nav a:hover{
            color:#ffcb05;
        }

        .container{
            width:90%;
            max-width:900px;
            margin:40px auto;
        }

        .search-box{
            background:white;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 15px rgba(0,0,0,.15);
        }

        .search-box h2{
            margin-bottom:20px;
            color:#d62828;
        }

        input{
            width:70%;
            padding:15px;
            font-size:18px;
            border:2px solid #ccc;
            border-radius:8px;
        }

        input:focus{
            outline:none;
            border:2px solid #d62828;
        }

        button{
            margin-top:20px;
            padding:15px 35px;
            background:#ffcb05;
            color:#222;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#f4b400;
        }

        #pokemonInfo{
            margin-top:40px;
        }

        .card{
            background:white;
            border-radius:20px;
            box-shadow:0 8px 20px rgba(0,0,0,.2);
            padding:30px;
            text-align:center;
        }

        .card img{
            width:220px;
            height:220px;
        }

        .card h2{
            color:#d62828;
            margin-bottom:20px;
            text-transform:capitalize;
        }

        .info{
            margin-top:20px;
            text-align:left;
        }

        .info p{
            padding:10px;
            border-bottom:1px solid #ddd;
            font-size:18px;
        }

        footer{
            margin-top:60px;
            background:#222;
            color:white;
            text-align:center;
            padding:20px;
        }

    </style>

</head>

<body>

<header>

    <h1>Pokémon Finder</h1>

    <p>Suche nach deinem Lieblings-Pokémon mit der PokéAPI</p>

</header>

<nav>

    <a href="index.html">Startseite</a>
    <a href="pokemon.html">Pokémon suchen</a>

</nav>

<div class="container">

    <div class="search-box">

        <h2>Pokémon suchen</h2>

        <input
            type="text"
            id="pokemonName"
            placeholder="z.B. Pikachu">

        <br>

        <button onclick="searchPokemon()">
            🔍 Suchen
        </button>

    </div>

    <div id="pokemonInfo"></div>

</div>

<footer>

    Schülerpraktikum – REST API Pokémon Projekt

</footer>

<script src="script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pokémon Finder</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}



body{
    background:#f4f4f4;
}



header{

    background:#d62828;
    color:white;
    text-align:center;
    padding:30px;

}


header h1{
    font-size:40px;
}



nav{

    background:#222;
    padding:15px;
    text-align:center;

}


nav a{

    color:white;
    text-decoration:none;
    margin:20px;
    font-weight:bold;

}



.container{

    width:90%;
    max-width:1100px;
    margin:40px auto;

}




.box{

    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    margin-bottom:30px;
    box-shadow:0 5px 15px #ccc;

}



input, select{

    padding:15px;
    width:70%;
    font-size:18px;
    border-radius:8px;
    border:2px solid #ccc;

}



button{

    margin-top:15px;
    padding:15px 30px;
    background:#ffcb05;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;

}



button:hover{

    background:#f4b400;

}




#pokemonList{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;

}





.pokemon-card{

    background:white;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 5px 15px #ccc;

}



.pokemon-card img{

    width:160px;

}



.pokemon-card h2{

    color:#d62828;
    text-transform:capitalize;

}



.evolution{

    margin-top:15px;
    font-weight:bold;

}





#pokemonInfo{

    margin-bottom:40px;

}





.card{

    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;

}



.card img{

    width:200px;

}



footer{

    background:#222;
    color:white;
    padding:20px;
    text-align:center;

}



</style>


</head>


<body>


<header>

<h1>
Pokémon Finder
</h1>

<p>
Suche und filtere Pokémon mit der PokéAPI
</p>

</header>




<nav>

<a href="index.html">
Startseite
</a>

</nav>





<div class="container">



<!-- Suche -->

<div class="box">


<h2>
Pokémon suchen
</h2>


<input 
id="pokemonName"
placeholder="z.B. Pikachu">


<br>


<button onclick="searchPokemon()">

🔍 Suchen

</button>


</div>





<div id="pokemonInfo"></div>






<!-- Filter -->

<div class="box">


<h2>
Pokémon nach Typ filtern
</h2>



<select id="typeFilter">


<option value="all">
Alle Typen
</option>


<option value="fire">
Fire
</option>


<option value="water">
Water
</option>


<option value="grass">
Grass
</option>


<option value="electric">
Electric
</option>


<option value="psychic">
Psychic
</option>


<option value="dragon">
Dragon
</option>


<option value="normal">
Normal
</option>


</select>



<br>


<button onclick="resetFilter()">

🔄 Alle Pokémon anzeigen

</button>


</div>





<!-- Liste -->


<div id="pokemonList"></div>



</div>





<footer>

REST API Pokémon Projekt

</footer>



<script src="script.js"></script>


</body>


</html>
